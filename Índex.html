<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Domingão do Boteco - Deluxe</title>
    <style>
        :root {
            --wood: #4a2e15;
            --wood-dark: #2c1a0a;
            --neon-green: #39ff14;
            --neon-pink: #ff00ff;
            --neon-yellow: #fffb00;
            --neon-blue: #00ffff;
            --boteco-red: #d32f2f;
            --azulejo-blue: #0277bd;
            --bg-dark: #111;
            --text-light: #f5f5f5;
            --font-main: 'Courier New', Courier, monospace;
            --font-title: 'Impact', fantasy, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        input, textarea { user-select: auto; }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-dark);
            color: var(--text-light);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* FILTRO TV COM DEFEITO (ESTÁTICA/GLITCH) */
        .tv-glitch::before {
            content: " "; display: block; position: fixed; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.05), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.05));
            z-index: 10; background-size: 100% 2px, 3px 100%; pointer-events: none;
        }
        
        .tv-static {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://upload.wikimedia.org/wikipedia/commons/5/5a/Static_noise.gif');
            opacity: 0.03; z-index: 11; pointer-events: none; display: none;
        }
        .tv-glitch .tv-static { display: block; }

        #app {
            width: 100%; max-width: 600px; height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.95)),
                        repeating-linear-gradient(45deg, var(--wood-dark) 0px, var(--wood) 20px, var(--wood-dark) 40px);
            position: relative; z-index: 1; display: flex; flex-direction: column;
            box-shadow: 0 0 50px #000; overflow: hidden;
        }

        /* JEQUITI FLASH */
        #jequiti {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #fff url('https://upload.wikimedia.org/wikipedia/pt/thumb/d/d3/Jequiti_Logo.png/250px-Jequiti_Logo.png') no-repeat center;
            background-size: contain; z-index: 9999; display: none;
        }

        .screen { display: none; flex-direction: column; height: 100%; padding: 20px; overflow-y: auto; }
        .screen.active { display: flex; animation: turnOn 0.4s ease-out; }

        @keyframes turnOn {
            0% { transform: scale(1, 0.01); filter: brightness(5); }
            100% { transform: scale(1, 1); filter: brightness(1); }
        }

        /* ESTILOS DE COMPONENTES */
        .neon-title { color: var(--neon-pink); font-size: 38px; text-shadow: 0 0 15px var(--neon-pink); text-align: center; margin-bottom: 20px; }
        .azulejo-box { background: #fff; background-image: linear-gradient(var(--azulejo-blue) 1px, transparent 1px), linear-gradient(90deg, var(--azulejo-blue) 1px, transparent 1px); background-size: 15px 15px; color: #000; padding: 15px; border: 3px solid var(--azulejo-blue); border-radius: 4px; margin-bottom: 15px; }
        
        .placar-audit { display: flex; justify-content: space-between; background: #000; border: 2px solid var(--neon-yellow); padding: 10px; border-radius: 8px; margin-bottom: 10px; box-shadow: 0 0 10px var(--neon-yellow); }
        .timer-display { text-align: center; font-size: 42px; font-family: var(--font-title); color: var(--neon-yellow); margin: 5px 0; }
        .timer-display.drama { color: #ff0000; animation: shake 0.1s infinite; }

        .mestre-secret { background: #000; color: var(--neon-green); padding: 10px; border: 2px dashed var(--neon-green); text-align: center; margin-bottom: 10px; }
        .category-badge { display: inline-block; background: var(--neon-pink); color: #fff; padding: 3px 8px; border-radius: 10px; font-size: 12px; margin-bottom: 5px; }

        .hint-item { background: #fff; color: #000; padding: 10px; margin-bottom: 5px; border-left: 5px solid var(--neon-blue); font-weight: bold; animation: slideIn 0.2s forwards; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }

        button { width: 100%; padding: 14px; font-family: var(--font-title); text-transform: uppercase; border: none; border-radius: 4px; cursor: pointer; margin-bottom: 8px; color: #fff; font-size: 16px; box-shadow: 0 4px 0 rgba(0,0,0,0.5); }
        button:active { transform: translateY(2px); box-shadow: 0 2px 0 rgba(0,0,0,0.5); }
        .btn-primary { background: #d32f2f; }
        .btn-secondary { background: #0277bd; }
        .btn-success { background: #2e7d32; }
        .btn-warning { background: #fbc02d; color: #000; }

        /* COMANDA */
        .comanda { background: #fffde7; color: #333; padding: 20px; font-family: 'Courier New', Courier, monospace; border: 1px solid #ddd; box-shadow: 5px 5px 0 #bbb; margin: 20px 0; position: relative; }
        .comanda::before { content: "***********************"; display: block; text-align: center; }
        .comanda h2 { text-align: center; font-size: 20px; margin: 10px 0; text-decoration: underline; }
        .comanda-row { display: flex; justify-content: space-between; border-bottom: 1px dashed #ccc; padding: 5px 0; }

        @keyframes shake { 0% { transform: translate(1px, 1px); } 50% { transform: translate(-1px, -2px); } 100% { transform: translate(1px, 1px); } }
        .hidden { display: none !important; }

    </style>
</head>

<div id="app">
    <!-- MENU -->
    <div id="screen-menu" class="screen active">
        <h1 class="neon-title" style="margin-top: 30px;">DOMINGÃO<br><span style="color:var(--neon-yellow); font-size: 22px;">DO BOTECO</span></h1>
        <div class="azulejo-box" style="text-align: center;">
            <p>Seja bem-vindo ao auditório mais insano do Brasil!</p>
        </div>
        <button class="btn-primary" onclick="nav('mestre-setup')">Modo Mestre</button>
        <button class="btn-secondary" onclick="nav('turn-setup')">Modo Turnos</button>
        <button class="btn-warning" onclick="toggleTV()" id="tv-status">TV: Com Defeito</button>
    </div>

    <!-- SETUP MESTRE -->
    <div id="screen-mestre-setup" class="screen">
        <h2 class="neon-title" style="font-size: 24px;">Configurações</h2>
        <div class="azulejo-box">
            <label>Pontos para Ganhar:</label>
            <input type="number" id="m-limit" value="70" style="width: 100%; padding: 10px; margin-bottom: 10px;">
            <label>Tempo por Dica (s):</label>
            <input type="number" id="m-timer-val" value="15" style="width: 100%; padding: 10px;">
        </div>
        <button class="btn-success" onclick="startMestreGame()">Iniciar Auditório</button>
        <button class="btn-primary" onclick="nav('menu')">Voltar</button>
    </div>

    <!-- JOGO MESTRE -->
    <div id="screen-mestre-game" class="screen">
        <div class="placar-audit">
            <div style="text-align: center;">TIME A<br><span id="m-t1-score" style="font-size: 24px; color: var(--neon-green);">0</span></div>
            <div style="align-self: center; color: var(--neon-pink);">VS</div>
            <div style="text-align: center;">TIME B<br><span id="m-t2-score" style="font-size: 24px; color: var(--neon-green);">0</span></div>
        </div>
        <div id="m-timer" class="timer-display">00:00</div>
        <div class="mestre-secret">
            <div class="category-badge" id="m-category">CATEGORIA</div>
            <h2 id="m-answer" onclick="revealMestreAns()" style="cursor: pointer; text-decoration: underline;">TOQUE PARA VER</h2>
        </div>
        <div id="m-hints-container" class="hint-list"></div>
        <div id="m-ctrl-pre">
            <button class="btn-primary" onclick="mestreNextHint(true)">Começar Rodada</button>
        </div>
        <div id="m-ctrl-playing" class="hidden">
            <button class="btn-secondary" id="m-btn-next-hint" onclick="mestreNextHint()">Próxima Dica</button>
            <div class="flex-row" style="display: flex; gap: 5px;">
                <button class="btn-success" onclick="mestreWin(1)">A Ganhou</button>
                <button class="btn-success" onclick="mestreWin(2)">B Ganhou</button>
            </div>
            <button class="btn-warning" onclick="mestreNobody()">Ninguém</button>
        </div>
    </div>

    <!-- SETUP TURNOS -->
    <div id="screen-turn-setup" class="screen">
        <h2 class="neon-title" style="font-size: 24px;">Vira-Vira</h2>
        <div class="azulejo-box">
            <label>Nomes (separe por vírgula):</label>
            <input type="text" id="t-players-input" value="Jogador 1, Jogador 2">
            <label>Pontos para Vitória:</label>
            <input type="number" id="t-limit" value="70" style="width: 100%; padding: 10px;">
        </div>
        <button class="btn-success" onclick="startTurnGame()">Começar Turnos</button>
        <button class="btn-primary" onclick="nav('menu')">Voltar</button>
    </div>

    <!-- JOGO TURNOS -->
    <div id="screen-turn-game" class="screen">
        <div class="placar-audit">
            <div style="text-align: center;"><span id="t-curr-player">JOGADOR</span><br><span id="t-curr-score" style="font-size: 24px; color: var(--neon-blue);">0</span></div>
        </div>
        <div id="t-timer" class="timer-display">00:00</div>
        <div class="category-badge" id="t-category">CATEGORIA</div>
        <div id="t-hints-container" class="hint-list" style="flex: 1;"></div>
        <input type="text" id="t-guess" placeholder="SEU PALPITE" style="width: 100%; padding: 15px; margin-bottom: 10px; text-align: center;">
        <div class="flex-row" style="display: flex; gap: 5px;">
            <button class="btn-success" onclick="turnGuess()">Chutar</button>
            <button class="btn-secondary" onclick="turnNextHint()">Dica</button>
        </div>
        <button class="btn-warning" onclick="turnSkip()">Pular</button>
    </div>

    <!-- COMANDA FINAL -->
    <div id="screen-comanda" class="screen">
        <h2 class="neon-title">A CONTA, CHEFE!</h2>
        <div id="comanda-target"></div>
        <button class="btn-success" onclick="location.reload()">Nova Partida</button>
    </div>

</div>

    let db = [];
    let state = {
        mestre: { scoreA: 0, scoreB: 0, currentItem: null, hintIdx: 0, timer: 0, interval: null, limit: 70 },
        turn: { players: [], currentP: 0, currentItem: null, hintIdx: 0, timer: 0, interval: null, limit: 70 },
        isTVOn: true
    };

    // INICIALIZAÇÃO
    function init() {
        parseDB();
        loadSettings();
        applyTV();
        setInterval(jequitiFlash, 45000); // Jequiti a cada 45s (raro)
    }

    function parseDB() {
        const lines = rawDB.split('\n');
        db = lines.map(l => {
            const parts = l.split('|');
            return { answer: parts[0], category: parts[1], hints: parts.slice(2) };
        });
    }

    function nav(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('screen-' + id).classList.add('active');
        saveSettings();
    }

    function toggleTV() {
        state.isTVOn = !state.isTVOn;
        applyTV();
    }

    function applyTV() {
        document.body.className = state.isTVOn ? 'tv-glitch' : '';
        document.getElementById('tv-status').innerText = state.isTVOn ? "TV: Com Defeito" : "TV: 4K (Sem Filtro)";
    }

    function jequitiFlash() {
        if(Math.random() > 0.7) {
            const j = document.getElementById('jequiti');
            j.style.display = 'block';
            setTimeout(() => j.style.display = 'none', 150);
        }
    }

    function saveSettings() {
        localStorage.setItem('boteco_state', JSON.stringify({ isTVOn: state.isTVOn }));
    }

    function loadSettings() {
        const s = localStorage.getItem('boteco_state');
        if(s) {
            const p = JSON.parse(s);
            state.isTVOn = p.isTVOn;
        }
    }

    // MODO MESTRE
    function startMestreGame() {
        state.mestre.limit = parseInt(document.getElementById('m-limit').value) || 70;
        state.mestre.scoreA = 0; state.mestre.scoreB = 0;
        updateMestreUI();
        mestreSetupRound();
        nav('mestre-game');
    }

    function mestreSetupRound() {
        clearInterval(state.mestre.interval);
        state.mestre.currentItem = db[Math.floor(Math.random() * db.length)];
        state.mestre.hintIdx = 0;
        document.getElementById('m-answer').innerText = "TOQUE PARA VER";
        document.getElementById('m-category').innerText = state.mestre.currentItem.category;
        document.getElementById('m-hints-container').innerHTML = "";
        document.getElementById('m-timer').innerText = "00:00";
        document.getElementById('m-ctrl-pre').classList.remove('hidden');
        document.getElementById('m-ctrl-playing').classList.add('hidden');
        document.getElementById('m-btn-next-hint').disabled = false;
        document.getElementById('m-pontos-potenciais').innerText = "10";
    }

    function revealMestreAns() {
        const el = document.getElementById('m-answer');
        el.innerText = state.mestre.currentItem.answer;
        setTimeout(() => { if(el.innerText !== "TOQUE PARA VER") el.innerText = "TOQUE PARA VER"; }, 7000);
    }

    function mestreStartTimer() {
        const baseTime = parseInt(document.getElementById('m-timer-val').value) || 15;
        state.mestre.timer = baseTime;
        document.getElementById('m-timer').innerText = formatTime(state.mestre.timer);
        
        state.mestre.interval = setInterval(() => {
            state.mestre.timer--;
            document.getElementById('m-timer').innerText = formatTime(state.mestre.timer);
            if(state.mestre.timer <= 5) document.getElementById('m-timer').classList.add('drama');
            else document.getElementById('m-timer').classList.remove('drama');

            if(state.mestre.timer <= 0) {
                if(state.mestre.hintIdx < state.mestre.currentItem.hints.length - 1) {
                    mestreNextHint();
                } else {
                    clearInterval(state.mestre.interval);
                }
            }
        }, 1000);
    }

    function mestreNextHint(first = false) {
        if(first) {
            document.getElementById('m-ctrl-pre').classList.add('hidden');
            document.getElementById('m-ctrl-playing').classList.remove('hidden');
            mestreStartTimer();
        }
        
        if(state.mestre.hintIdx < state.mestre.currentItem.hints.length) {
            const h = state.mestre.currentItem.hints[state.mestre.hintIdx];
            const div = document.createElement('div');
            div.className = 'hint-item';
            div.innerText = (state.mestre.hintIdx + 1) + ". " + h;
            document.getElementById('m-hints-container').appendChild(div);
            state.mestre.hintIdx++;
            state.mestre.timer = parseInt(document.getElementById('m-timer-val').value) || 15;
            document.getElementById('m-pontos-potenciais').innerText = Math.max(1, 11 - state.mestre.hintIdx);
        }
        if(state.mestre.hintIdx >= state.mestre.currentItem.hints.length) {
            document.getElementById('m-btn-next-hint').disabled = true;
        }
    }

    function mestreWin(t) {
        const pts = Math.max(1, 11 - state.mestre.hintIdx);
        if(t === 1) state.mestre.scoreA += pts; else state.mestre.scoreB += pts;
        updateMestreUI();
        checkVictory();
    }

    function mestreNobody() { mestreSetupRound(); }

    function updateMestreUI() {
        document.getElementById('m-t1-score').innerText = state.mestre.scoreA;
        document.getElementById('m-t2-score').innerText = state.mestre.scoreB;
    }

    function checkVictory() {
        if(state.mestre.scoreA >= state.mestre.limit || state.mestre.scoreB >= state.mestre.limit) {
            showComanda("AUDITÓRIO", [
                { k: "Vencedor", v: state.mestre.scoreA >= state.mestre.limit ? "TIME A" : "TIME B" },
                { k: "Placar A", v: state.mestre.scoreA },
                { k: "Placar B", v: state.mestre.scoreB }
            ]);
        } else {
            mestreSetupRound();
        }
    }

    // MODO TURNOS
    function startTurnGame() {
        const names = document.getElementById('t-players-input').value.split(',').map(n => n.trim());
        state.turn.players = names.map(n => ({ name: n, score: 0 }));
        state.turn.limit = parseInt(document.getElementById('t-limit').value) || 70;
        state.turn.currentP = 0;
        turnSetupRound();
        nav('turn-game');
    }

    function turnSetupRound() {
        clearInterval(state.turn.interval);
        state.turn.currentItem = db[Math.floor(Math.random() * db.length)];
        state.turn.hintIdx = 0;
        state.turn.timer = 60; 
        document.getElementById('t-hints-container').innerHTML = "";
        document.getElementById('t-curr-player').innerText = state.turn.players[state.turn.currentP].name;
        document.getElementById('t-curr-score').innerText = state.turn.players[state.turn.currentP].score;
        document.getElementById('t-category').innerText = state.turn.currentItem.category;
        document.getElementById('t-guess').value = "";
        document.getElementById('t-timer').innerText = formatTime(state.turn.timer);
        turnNextHint();
        startTurnTimer();
    }

    function startTurnTimer() {
        state.turn.interval = setInterval(() => {
            state.turn.timer--;
            document.getElementById('t-timer').innerText = formatTime(state.turn.timer);
            if(state.turn.timer <= 0) { turnSkip(); }
        }, 1000);
    }

    function turnNextHint() {
        if(state.turn.hintIdx < state.turn.currentItem.hints.length) {
            const h = state.turn.currentItem.hints[state.turn.hintIdx];
            const div = document.createElement('div');
            div.className = 'hint-item';
            div.innerText = h;
            document.getElementById('t-hints-container').appendChild(div);
            state.turn.hintIdx++;
        }
    }

    function turnGuess() {
        const g = normalize(document.getElementById('t-guess').value);
        const a = normalize(state.turn.currentItem.answer);
        if(g === a) {
            const pts = Math.max(1, 11 - state.turn.hintIdx);
            state.turn.players[state.turn.currentP].score += pts;
            if(state.turn.players[state.turn.currentP].score >= state.turn.limit) {
                showComanda("VIRA-VIRA", state.turn.players.map(p => ({ k: p.name, v: p.score + " pts" })));
            } else {
                nextPlayer();
            }
        } else {
            alert("ERROU!");
        }
    }

    function turnSkip() { nextPlayer(); }
    function nextPlayer() {
        state.turn.currentP = (state.turn.currentP + 1) % state.turn.players.length;
        turnSetupRound();
    }

    // COMANDA
    function showComanda(modo, rows) {
        nav('comanda');
        let html = `<div class="comanda">
            <h2>COMANDA DE BOTECO</h2>
            <p style="text-align:center">MODO: ${modo}</p><br>`;
        rows.forEach(r => {
            html += `<div class="comanda-row"><span>${r.k}</span><span>${r.v}</span></div>`;
        });
        html += `<br><p style="text-align:center">Obrigado pela preferência!</p></div>`;
        document.getElementById('comanda-target').innerHTML = html;
    }

    function formatTime(s) {
        const min = Math.floor(s/60); const sec = s%60;
        return min.toString().padStart(2,'0') + ":" + sec.toString().padStart(2,'0');
    }
    function normalize(s) { return s.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim(); }

    init();
</script>
